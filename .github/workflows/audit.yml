name: Security audit

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master, dev]
  workflow_dispatch:
  schedule:
    
    - cron: "0 6 * * 1" # Monday 06:00 UTC - detect new advisories even without push

permissions:
  contents: read

jobs:
  audit:
    name: cargo audit (RustSec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run cargo audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
